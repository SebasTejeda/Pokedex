<!-- src/app/pages/login/login.component.html -->
<div class="login-container">
  <div class="login-card">
    <!-- Header -->
    <div class="login-header">
      <div class="logo-container">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" 
             alt="Pokéball" 
             class="logo">
      </div>
      <h1 class="login-title">Iniciar Sesión</h1>
      <p class="login-subtitle">Accede a tu Pokédex Competitiva</p>
    </div>

    <!-- Mensaje de error -->
    @if (errorMessage()) {
      <div class="error-alert">
        <svg class="error-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <!-- Formulario -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      
      <!-- Email -->
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email"
          class="form-input"
          [class.input-error]="isFieldInvalid('email')"
          placeholder="tu@email.com"
          autocomplete="email">
        @if (isFieldInvalid('email')) {
          <span class="error-text">{{ getFieldError('email') }}</span>
        }
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label for="password" class="form-label">Contraseña</label>
        <div class="password-input-container">
          <input 
            [type]="showPassword() ? 'text' : 'password'" 
            id="password" 
            formControlName="password"
            class="form-input password-input"
            [class.input-error]="isFieldInvalid('password')"
            placeholder="••••••••"
            autocomplete="current-password">
          <button 
            type="button" 
            class="toggle-password-btn"
            (click)="togglePasswordVisibility()">
            @if (showPassword()) {
              <!-- Ojo cerrado -->
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            } @else {
              <!-- Ojo abierto -->
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            }
          </button>
        </div>
        @if (isFieldInvalid('password')) {
          <span class="error-text">{{ getFieldError('password') }}</span>
        }
      </div>

      <!-- Botón de login -->
      <button 
        type="submit" 
        class="login-button"
        [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="spinner"></span>
          <span>Iniciando sesión...</span>
        } @else {
          <span>Iniciar Sesión</span>
        }
      </button>

    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p class="register-text">
        ¿No tienes cuenta? 
        <a routerLink="/register" class="register-link">Regístrate aquí</a>
      </p>
    </div>

  </div>
</div>
